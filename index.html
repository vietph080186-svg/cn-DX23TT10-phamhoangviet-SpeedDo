<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xưởng SVG Mini</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">Đồ án học phần SVG</p>
            <h1>Xưởng SVG Mini</h1>
            <p class="intro">Thử thay đổi hình dạng, màu sắc, kích thước và góc xoay của đối tượng SVG.</p>
        </div>
    </header>

    <main class="app-layout">
        <section class="preview-panel" aria-label="Khu vực hiển thị SVG">
            <svg class="svg-stage" viewBox="0 0 320 320" role="img" aria-labelledby="svgTitle svgDesc">
                <title id="svgTitle">Hình SVG tương tác</title>
                <desc id="svgDesc">Người dùng có thể đổi màu, kích thước, góc xoay và hình dạng.</desc>
                <rect class="stage-background" x="16" y="16" width="288" height="288" rx="24"></rect>
                <g id="svgObject" class="svg-object" transform="translate(160 160)">
                    <circle id="mainCircle" r="72"></circle>
                    <rect id="mainSquare" x="-72" y="-72" width="144" height="144" rx="18" hidden></rect>
                    <polygon id="mainTriangle" points="0,-84 84,72 -84,72" hidden></polygon>
                </g>
            </svg>
            <p id="statusText" class="status-text">Đang hiển thị hình tròn màu xanh.</p>
        </section>

        <section class="control-panel" aria-label="Bảng điều khiển">
            <div class="control-group">
                <label for="shapeSelect">Hình dạng</label>
                <select id="shapeSelect">
                    <option value="circle">Hình tròn</option>
                    <option value="square">Hình vuông</option>
                    <option value="triangle">Hình tam giác</option>
                </select>
            </div>

            <div class="control-group">
                <span>Màu sắc</span>
                <div class="color-list" aria-label="Chọn màu">
                    <button class="color-button active" type="button" data-color="#2563eb" aria-label="Màu xanh"></button>
                    <button class="color-button" type="button" data-color="#16a34a" aria-label="Màu xanh lá"></button>
                    <button class="color-button" type="button" data-color="#dc2626" aria-label="Màu đỏ"></button>
                    <button class="color-button" type="button" data-color="#f59e0b" aria-label="Màu vàng"></button>
                </div>
            </div>

            <div class="control-group">
                <label for="sizeRange">Kích thước: <span id="sizeValue">100%</span></label>
                <input id="sizeRange" type="range" min="60" max="140" value="100">
            </div>

            <div class="control-group">
                <label for="rotateRange">Góc xoay: <span id="rotateValue">0°</span></label>
                <input id="rotateRange" type="range" min="0" max="360" value="0">
            </div>

            <button id="resetButton" class="reset-button" type="button">Đặt lại</button>
        </section>
    </main>

    <script src="src/main.js"></script>
</body>
</html>
